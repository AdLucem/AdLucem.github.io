<h1>{{ page.title }}</h1>

	<p>The "profit" part of "for fun and profit".</p>

	<ul class="posts">

	  {% for post in site.posts %}
	  	{% if post.categories contains 'work' %}
	    <li>
		    <a class="title" href="{{ post. }}" title="{{ post.title }}">{{ post.title }}</a>
		    <br/>
	    	<p class="desc">{{ post.contents }}</p> 
	    </li>
	    {% endif %}
	  {% endfor %}
	</ul>
