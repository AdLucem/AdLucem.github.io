---
layout: default
title: Interesting Projects
category: projects
cssfile: project.css
---

<h1>{{ page.title }}</h1>
	<ul class="posts">

	  {% for post in site.posts %}
	  	{% if post.categories contains 'project' %}
	    <li><a href="{{ post.url }}" title="{{ post.title }}">{{ post.title }}</a></li>
	    <li> <p>{{ post.desc }}</p> </li>
	        {% endif %}
	  {% endfor %}
	</ul>
